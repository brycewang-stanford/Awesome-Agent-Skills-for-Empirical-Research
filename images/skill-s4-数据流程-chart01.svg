<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 650">
  <rect width="1080" height="650" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="540" y="60" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#1E293B" text-anchor="middle">实证研究数据获取与清洗流程</text>

  <!-- Step 1 -->
  <rect x="60" y="110" width="200" height="160" rx="12" fill="#2563EB"/>
  <text x="160" y="155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="160" y="195" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">确定数据源</text>
  <text x="160" y="230" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">FRED/世行</text>
  <text x="160" y="258" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">CFPS/CGSS</text>

  <!-- Arrow -->
  <polygon points="270,190 290,180 290,200" fill="#3B82F6"/>

  <!-- Step 2 -->
  <rect x="300" y="110" width="200" height="160" rx="12" fill="#3B82F6"/>
  <text x="400" y="155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="400" y="195" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">数据下载</text>
  <text x="400" y="230" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">API/手动</text>
  <text x="400" y="258" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">数据库查询</text>

  <!-- Arrow -->
  <polygon points="510,190 530,180 530,200" fill="#60A5FA"/>

  <!-- Step 3 -->
  <rect x="540" y="110" width="200" height="160" rx="12" fill="#60A5FA"/>
  <text x="640" y="155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="640" y="195" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">数据清洗</text>
  <text x="640" y="230" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">缺失值/异常值</text>
  <text x="640" y="258" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">合并/变形</text>

  <!-- Arrow -->
  <polygon points="750,190 770,180 770,200" fill="#93C5FD"/>

  <!-- Step 4 -->
  <rect x="780" y="110" width="240" height="160" rx="12" fill="#93C5FD"/>
  <text x="900" y="155" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#1E293B" text-anchor="middle">4</text>
  <text x="900" y="195" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#1E293B" text-anchor="middle">描述性统计</text>
  <text x="900" y="230" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#1E293B" text-anchor="middle">均值/中位数/分布</text>
  <text x="900" y="258" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#1E293B" text-anchor="middle">相关性分析</text>

  <!-- Tools row -->
  <text x="540" y="330" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#6B7280" text-anchor="middle">各环节推荐工具</text>

  <!-- Tool cards -->
  <rect x="60" y="360" width="200" height="120" rx="12" fill="#F3F4F6"/>
  <text x="160" y="395" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#2563EB" text-anchor="middle">数据发现</text>
  <text x="160" y="430" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">Google Dataset</text>
  <text x="160" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">马克数据网</text>

  <rect x="300" y="360" width="200" height="120" rx="12" fill="#F3F4F6"/>
  <text x="400" y="395" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#3B82F6" text-anchor="middle">数据获取</text>
  <text x="400" y="430" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">SQL / API</text>
  <text x="400" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">Wind / CSMAR</text>

  <rect x="540" y="360" width="200" height="120" rx="12" fill="#F3F4F6"/>
  <text x="640" y="395" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#60A5FA" text-anchor="middle">清洗工具</text>
  <text x="640" y="430" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">pandas / polars</text>
  <text x="640" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">tidyverse / Stata</text>

  <rect x="780" y="360" width="240" height="120" rx="12" fill="#F3F4F6"/>
  <text x="900" y="395" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#2563EB" text-anchor="middle">统计输出</text>
  <text x="900" y="430" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">outreg2 / esttab</text>
  <text x="900" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">stargazer</text>

  <!-- Key data sources summary -->
  <rect x="60" y="510" width="960" height="80" rx="12" fill="#F3F4F6" stroke="#2563EB" stroke-width="1"/>
  <text x="540" y="545" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#2563EB" text-anchor="middle">免费数据源 TOP 6</text>
  <text x="540" y="578" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#374151" text-anchor="middle">FRED (80万+序列) | 世界银行 (200+国家) | 国家统计局 | NBER | CFPS | Our World in Data</text>

  <!-- Footer -->
  <text x="540" y="630" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#9CA3AF" text-anchor="middle">数据来源：AEA Data Resources、Boston University Economics Datasets Guide</text>
</svg>