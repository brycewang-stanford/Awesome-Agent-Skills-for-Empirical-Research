  <rect x="60" y="530" width="960" height="100" rx="12" fill="#F3F4F6" stroke="#2563EB" stroke-width="2"/>
  <text x="540" y="570" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#2563EB" text-anchor="middle">核心原则：AI 是"放大器"而非"替代品"</text>
