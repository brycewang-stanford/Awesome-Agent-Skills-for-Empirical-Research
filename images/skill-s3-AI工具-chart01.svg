  <text x="900" y="435" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#2563EB" text-anchor="middle">Grammarly</text>
  <text x="900" y="470" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#6B7280" text-anchor="middle">语法检查润色</text>

